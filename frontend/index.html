<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP MySQL Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/styles/base.css" rel="stylesheet">
    <link href="/styles/mobile.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script type="module" src="https://unpkg.com/deep-chat@2.4.2/dist/deepChat.bundle.js"></script>
</head>
<body class="overflow-hidden">
    <div x-data="mcpExplorerApp()" class="d-flex w-100 vh-100 wrapper-scroll">

        <!-- Mobile Header -->
        <header class="mobile-header d-md-none w-100 py-2 px-3 d-flex align-items-center justify-content-between position-fixed top-0" style="z-index:1060;background:var(--bg-main)">
            <h5 class="m-0 fw-bold d-flex align-items-center gap-2 text-primary"><i class="bi bi-database-gear"></i> MCP Explorer</h5>
            <button class="btn btn-dark border-secondary p-2 rounded-3" @click="isSidebarOpen = true"><i class="bi bi-list fs-4"></i></button>
        </header>

        <!-- Sidebar Overlay -->
        <div x-show="isSidebarOpen" x-transition class="sidebar-overlay d-md-none" @click="isSidebarOpen = false" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1040"></div>

        <!-- Sidebar -->
        <aside class="sidebar d-flex flex-column" :class="{'mobile-open': isSidebarOpen}">
            <div class="sidebar-header p-3 border-bottom d-flex justify-content-between align-items-center" style="background:var(--bg-darker)">
                <h4 class="m-0 fw-bold d-flex align-items-center gap-2" style="color:var(--c-text-1)"><i class="bi bi-database-gear text-primary"></i> MCP Explorer</h4>
                <button class="btn btn-link d-md-none p-0" @click="isSidebarOpen = false"><i class="bi bi-x-lg fs-4" style="color:var(--c-text-1)"></i></button>
            </div>

            <!-- Navigation -->
            <nav class="p-2">
                <ul class="nav flex-column gap-1">
                    <li class="nav-item"><a href="#" class="nav-link w-100 text-start btn-custom rounded-3" :class="{'active-nav': activeTab === 'chat'}" @click.prevent="activeTab='chat'"><i class="bi bi-chat-dots me-2"></i> Chat IA</a></li>
                    <li class="nav-item"><a href="#" class="nav-link w-100 text-start btn-custom rounded-3" :class="{'active-nav': activeTab === 'connections'}" @click.prevent="activeTab='connections'"><i class="bi bi-plug me-2"></i> Conexiones</a></li>
                </ul>
            </nav>

            <!-- Chat History -->
            <div class="flex-grow-1 overflow-auto px-2 pb-4" x-show="activeTab === 'chat'">
                <div class="text-secondary small fw-bold px-2 mb-2 mt-3 text-uppercase opacity-50">Chats Recientes</div>
                <ul class="list-unstyled d-flex flex-column gap-1">
                    <template x-for="chat in chats" :key="chat.id">
                        <li class="d-flex align-items-center rounded-3" :class="{'active-chat': chat.id === currentChatId}" style="background:var(--bg-darker)">
                            <button class="btn btn-sm text-start text-truncate py-2 px-3 flex-grow-1" style="color:var(--c-text-1)" @click="loadMessages(chat.id)">
                                <i class="bi bi-chat-left-dots me-2 opacity-50"></i><span x-text="chat.title || 'Chat'"></span>
                            </button>
                            <button class="btn btn-sm btn-link text-danger px-2" @click.stop="deleteChat(chat.id)"><i class="bi bi-trash"></i></button>
                        </li>
                    </template>
                </ul>
            </div>

            <!-- Sidebar Footer -->
            <div class="mt-auto border-top p-3" style="border-color:var(--c-border)">
                <button class="btn btn-outline-primary w-100 rounded-pill py-2 mb-3" @click="newChat()"><i class="bi bi-plus-lg me-1"></i> Nuevo Chat</button>
                <button @click="toggleTheme()" class="theme-toggle-btn w-100" :title="theme === 'dark' ? 'Modo claro' : 'Modo oscuro'" style="display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.5rem;border:1px solid var(--c-border);border-radius:0.5rem;background:transparent;color:var(--c-text-2);cursor:pointer">
                    <i class="bi" :class="theme === 'dark' ? 'bi-sun-fill text-warning' : 'bi-moon-stars-fill text-primary'"></i>
                    <span x-text="theme === 'dark' ? 'Claro' : 'Oscuro'"></span>
                </button>
            </div>
        </aside>

        <!-- Main Panel -->
        <main class="main-panel d-flex flex-column h-100 overflow-hidden">

            <!-- Top Bar -->
            <div class="p-3 border-bottom d-flex align-items-center justify-content-between flex-wrap gap-2" style="background:var(--bg-main)">
                <div class="d-flex align-items-center gap-2 flex-shrink-0">
                    <!-- DB Selector -->
                    <div class="db-selector-wrapper">
                        <i class="bi bi-database-fill db-selector-icon"></i>
                        <select x-model="selectedConnectionId" class="db-selector-pill" :class="{ 'placeholder': !selectedConnectionId }">
                            <option value="" disabled selected>Selecciona BD...</option>
                            <template x-for="conn in connections" :key="conn.id">
                                <option :value="conn.id" x-text="conn.name"></option>
                            </template>
                        </select>
                    </div>
                    <button x-show="currentChatId && activeTab === 'chat'" class="btn btn-sm btn-outline-secondary rounded-pill px-3" @click="newChat()"><i class="bi bi-plus-lg me-1"></i><span class="d-none d-sm-inline">Nuevo Chat</span></button>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <button @click="toggleTheme()" class="theme-icon-btn" :title="theme === 'dark' ? 'Cambiar tema' : ''" :aria-label="theme === 'dark' ? 'Modo claro' : 'Modo oscuro'">
                        <i class="bi" :class="theme === 'dark' ? 'bi-sun-fill' : 'bi-moon-stars-fill'"></i>
                    </button>
                    <div class="px-3 py-1 rounded-pill border shadow-sm" style="font-size:0.7rem;background:var(--bg-darker)">
                        <span :class="systemInfo.aiProvider === 'ollama' ? 'text-warning' : 'text-info'"><i class="bi" :class="systemInfo.aiProvider === 'ollama' ? 'bi-cpu-fill' : 'bi-cloud-check-fill'"></i></span>
                        <span class="fw-bold d-none d-sm-inline ms-1" style="color:var(--c-text-2)" x-text="systemInfo.aiProvider.toUpperCase()"></span>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="flex-grow-1 overflow-auto p-3" style="background:var(--bg-main)">

                <!-- Chat Tab -->
                <div x-show="activeTab === 'chat'" class="h-100 d-flex flex-column">
                    <!-- Deep Chat Component -->
                    <deep-chat 
                        id="deep-chat-element"
                        style="width:100%; height:100%; border:none; flex-grow:1; min-height:0; font-family:'Inter',sans-serif;">
                    </deep-chat>
                </div>

                <!-- Connections Tab -->
                <div x-show="activeTab === 'connections'">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="m-0" style="color:var(--c-text-1)">Conexiones de Base de Datos</h5>
                        <button class="btn btn-sm btn-primary rounded-pill px-3" @click="openConnModal(); console.log('Button clicked!')"><i class="bi bi-plus-lg me-1"></i> Nueva Conexión</button>
                    </div>
                    <div class="row g-3">
                        <template x-for="conn in connections" :key="conn.id">
                            <div class="col-md-6 col-lg-4">
                                <div class="card h-100" style="background:var(--bg-darker);border-color:var(--c-border)">
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between align-items-start mb-2">
                                            <h6 class="card-title m-0" style="color:var(--c-text-1)"><i class="bi bi-database me-2 text-primary"></i><span x-text="conn.name"></span></h6>
                                            <span class="badge" :class="conn.isActive ? 'bg-success' : 'bg-secondary'" x-text="conn.isActive ? 'Activa' : 'Inactiva'"></span>
                                        </div>
                                        <p class="small mb-1" style="color:var(--c-text-2)"><i class="bi bi-hdd me-1"></i><span x-text="`${conn.host}:${conn.port}/${conn.database}`"></span></p>
                                        <div class="d-flex gap-2 mt-3">
                                            <button class="btn btn-sm btn-outline-primary rounded-pill flex-grow-1" @click="testConnection(conn.id)">Probar</button>
                                            <button class="btn btn-sm btn-outline-danger rounded-pill" @click="deleteConnection(conn.id)"><i class="bi bi-trash"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                        <template x-if="connections.length === 0">
                            <div class="col-12 text-center py-5" style="color:var(--c-text-2)">
                                <i class="bi bi-plug fs-1 d-block mb-3 opacity-50"></i>
                                <p>No hay conexiones configuradas</p>
                                <button class="btn btn-sm btn-primary rounded-pill" @click="openConnModal()">Crear primera conexión</button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </main>

    <!-- Connection Modal -->
    <div x-show="showConnModal" 
         class="position-fixed" 
         style="top:0; left:0; right:0; bottom:0; z-index:1050; background:rgba(0,0,0,0.7);"
         @keydown.escape.window="showConnModal=false"
         @click.self="showConnModal=false">
        <div class="d-flex align-items-center justify-content-center h-100">
            <div class="modal-dialog" style="margin:0; max-width:500px; width:90%;">
                <div class="modal-content" :style="{ background: theme === 'dark' ? '#1a1a1a' : '#fff', border: '1px solid ' + (theme === 'dark' ? '#333' : '#ddd'), borderRadius: '8px' }">
                    <div class="modal-header d-flex justify-content-between align-items-center p-3" :style="{ borderBottom: '1px solid ' + (theme === 'dark' ? '#333' : '#ddd') }">
                        <h5 class="modal-title m-0" :style="{ color: theme === 'dark' ? '#fafafa' : '#18181b' }">Nueva Conexión</h5>
                        <button type="button" class="btn-close" :class="theme === 'dark' ? 'btn-close-white' : ''" @click="showConnModal=false" style="font-size:0.8rem;"></button>
                    </div>
                    <div class="modal-body p-3">
                        <div class="mb-3">
                            <label class="form-label small" :style="{ color: theme === 'dark' ? '#a1a1aa' : '#52525b' }">Nombre *</label>
                            <input type="text" x-model="newConn.name" class="form-control form-control-sm" 
                                   :style="{ background: theme === 'dark' ? '#111' : '#f8f9fa', color: theme === 'dark' ? '#fafafa' : '#18181b', borderColor: theme === 'dark' ? '#333' : '#ced4da' }" 
                                   placeholder="Mi Base de Datos">
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-8">
                                <label class="form-label small" :style="{ color: theme === 'dark' ? '#a1a1aa' : '#52525b' }">Host *</label>
                                <input type="text" x-model="newConn.host" class="form-control form-control-sm" 
                                       :style="{ background: theme === 'dark' ? '#111' : '#f8f9fa', color: theme === 'dark' ? '#fafafa' : '#18181b', borderColor: theme === 'dark' ? '#333' : '#ced4da' }" 
                                       placeholder="localhost">
                            </div>
                            <div class="col-4">
                                <label class="form-label small" :style="{ color: theme === 'dark' ? '#a1a1aa' : '#52525b' }">Puerto</label>
                                <input type="number" x-model.number="newConn.port" class="form-control form-control-sm" 
                                       :style="{ background: theme === 'dark' ? '#111' : '#f8f9fa', color: theme === 'dark' ? '#fafafa' : '#18181b', borderColor: theme === 'dark' ? '#333' : '#ced4da' }">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small" :style="{ color: theme === 'dark' ? '#a1a1aa' : '#52525b' }">Usuario *</label>
                            <input type="text" x-model="newConn.user" class="form-control form-control-sm" 
                                   :style="{ background: theme === 'dark' ? '#111' : '#f8f9fa', color: theme === 'dark' ? '#fafafa' : '#18181b', borderColor: theme === 'dark' ? '#333' : '#ced4da' }">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small" :style="{ color: theme === 'dark' ? '#a1a1aa' : '#52525b' }">Contraseña</label>
                            <input type="password" x-model="newConn.password" class="form-control form-control-sm" 
                                   :style="{ background: theme === 'dark' ? '#111' : '#f8f9fa', color: theme === 'dark' ? '#fafafa' : '#18181b', borderColor: theme === 'dark' ? '#333' : '#ced4da' }">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small" :style="{ color: theme === 'dark' ? '#a1a1aa' : '#52525b' }">Base de Datos *</label>
                            <input type="text" x-model="newConn.database" class="form-control form-control-sm" 
                                   :style="{ background: theme === 'dark' ? '#111' : '#f8f9fa', color: theme === 'dark' ? '#fafafa' : '#18181b', borderColor: theme === 'dark' ? '#333' : '#ced4da' }">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small" :style="{ color: theme === 'dark' ? '#a1a1aa' : '#52525b' }">Descripción del Esquema (opcional)</label>
                            <textarea x-model="newConn.description" class="form-control form-control-sm" rows="3" 
                                      :style="{ background: theme === 'dark' ? '#111' : '#f8f9fa', color: theme === 'dark' ? '#fafafa' : '#18181b', borderColor: theme === 'dark' ? '#333' : '#ced4da' }" 
                                      placeholder="TABLA: pedidos&#10;- pedido_id (INT, PK)&#10;- fecha (DATETIME)..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer d-flex justify-content-end gap-2 p-3" :style="{ borderTop: '1px solid ' + (theme === 'dark' ? '#333' : '#ddd') }">
                        <button class="btn btn-sm btn-outline-secondary rounded-pill" @click="showConnModal=false">Cancelar</button>
                        <button class="btn btn-sm btn-primary rounded-pill" @click="saveConnection()">Guardar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/src/utils.js"></script>
    <script src="/src/mcp-explorer.js"></script>
</body>
</html>
